<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Sheets × Maps</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" type="text/css" href="style.css" />
</head>
<body>
<header>
  <div class="logo">
    <div class="logo-dot"></div>
    Google <span>/ sheets × maps</span>
  </div>
  <div class="header-actions">
    <button id="table-toggle" class="sidebar-toggle" title="Toggle Data Table">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="14" height="3" rx="0.75" fill="currentColor"/>
        <rect x="2" y="7.5" width="14" height="1.5" rx="0.75" fill="currentColor" opacity="0.6"/>
        <rect x="2" y="11" width="14" height="1.5" rx="0.75" fill="currentColor" opacity="0.6"/>
        <rect x="2" y="14.5" width="8" height="1.5" rx="0.75" fill="currentColor" opacity="0.6"/>
      </svg>
      <span>Table</span>
    </button>
    <button id="sidebar-toggle" class="sidebar-toggle" title="Toggle Filters">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="8.25" width="10" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="12.5" width="6" height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
      <span>Filters</span>
    </button>
  </div>
</header>

<main>
<div class="layout">
  
  <!-- MAP -->
  <div id="map"></div>

  <!-- SIDEBAR -->
  <aside id="sidebar" class="sidebar">
    <div class="sidebar-inner">

      <!-- TAB BAR -->
      <div class="sidebar-tabs">
        <button class="sidebar-tab sidebar-tab--active" data-tab="filters">Filters</button>
        <button class="sidebar-tab" data-tab="layers">Layers</button>
      </div>

      <!-- ── FILTERS PANEL ── -->
      <div class="sidebar-panel" id="panel-filters">

        <div class="sidebar-section">
          <div class="sidebar-label">Time Window</div>
          <p class="sidebar-hint">Show markers active within this range</p>
        </div>

        <div class="sidebar-section">
          <label class="field-label" for="start-datetime">
            <span class="field-icon">▶</span> Start
          </label>
          <input type="datetime-local" id="start-datetime" class="dt-input" />
        </div>

        <div class="sidebar-section">
          <label class="field-label" for="end-datetime">
            <span class="field-icon">■</span> End
          </label>
          <input type="datetime-local" id="end-datetime" class="dt-input" />
        </div>

        <div class="sidebar-section">
          <button id="apply-filter" class="btn-apply">Apply Filter</button>
          <button id="clear-filter" class="btn-clear">Clear</button>
        </div>

        <div class="sidebar-section">
          <div class="filter-status" id="filter-status">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">No filter active</span>
          </div>
        </div>

        <div class="sidebar-section sidebar-section--stats">
          <div class="stat-row">
            <span class="stat-label">Total markers</span>
            <span class="stat-value" id="stat-total">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Visible</span>
            <span class="stat-value accent" id="stat-visible">—</span>
          </div>
          <div class="stat-row">
            <span class="stat-label">Hidden</span>
            <span class="stat-value muted" id="stat-hidden">—</span>
          </div>
        </div>

      </div><!-- /panel-filters -->

      <!-- ── LAYERS PANEL ── -->
      <div class="sidebar-panel sidebar-panel--hidden" id="panel-layers">

        <div class="sidebar-section">
          <div class="sidebar-label">Map Layers</div>
          <p class="sidebar-hint">Toggle polygon layers on or off</p>
        </div>

        <div class="sidebar-section">
          <label class="layer-row">
            <span class="layer-info">
              <span class="layer-swatch layer-swatch--1"></span>
              <span class="layer-name">Layer 1</span>
            </span>
            <input type="checkbox" id="layer1-toggle" class="layer-checkbox" checked />
            <span class="layer-switch"></span>
          </label>
        </div>

        <div class="sidebar-section">
          <label class="layer-row">
            <span class="layer-info">
              <span class="layer-swatch layer-swatch--2"></span>
              <span class="layer-name">Layer 2</span>
            </span>
            <input type="checkbox" id="layer2-toggle" class="layer-checkbox" checked />
            <span class="layer-switch"></span>
          </label>
        </div>

      </div><!-- /panel-layers -->

    </div>
  </aside>

  <!-- DATA TABLE OVERLAY -->
  <div id="table-overlay" class="table-overlay table-overlay--hidden">
    <div class="table-overlay-header">
      <div class="table-overlay-title">
        <span class="table-overlay-count" id="table-count">— entries</span>
      </div>
      <div class="table-overlay-controls">
        <div class="table-search-wrap">
          <svg class="table-search-icon" width="13" height="13" viewBox="0 0 13 13" fill="none">
            <circle cx="5.5" cy="5.5" r="4" stroke="currentColor" stroke-width="1.4"/>
            <line x1="8.7" y1="8.7" x2="12" y2="12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          <input type="text" id="table-search" class="table-search-input" placeholder="Search ID, start or end datetime…" autocomplete="off" />
          <button id="table-search-clear" class="table-search-clear" title="Clear search" hidden>✕</button>
        </div>
        <!-- Add Marker button in table header -->
        <button id="table-add-marker-btn" class="btn-add-marker" title="Add new marker">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
            <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
          Add Marker
        </button>
        <button id="table-close" class="table-close-btn" title="Close table">✕</button>
      </div>
    </div>
    <div class="table-scroll">
      <table id="data-table" class="data-table">
        <thead>
          <tr>
            <th data-col="id">ID <span class="th-sort"></span></th>
            <th data-col="coords">Coordinates</th>
            <th data-col="height">Height</th>
            <th data-col="startdatetime">Start <span class="th-sort"></span></th>
            <th data-col="enddatetime">End <span class="th-sort"></span></th>
          </tr>
        </thead>
        <tbody id="data-table-body">
          <tr class="table-loading-row"><td colspan="5">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Mini OLS Checker -->
  <div id="control-panel" class="collapsed">
    <button id="toggle-btn" onclick="toggleMenu()">
      <svg width="14" height="14" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="4"    width="14" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="8.25" width="10" height="1.5" rx="0.75" fill="currentColor"/>
        <rect x="2" y="12.5" width="6"  height="1.5" rx="0.75" fill="currentColor"/>
      </svg>
      OLS Checker
    </button>

    <div id="menu-content">
      <div class="ols-label">Coordinates</div>

      <div class="ols-field">
        <label class="ols-field-label" for="lat-input">
          <span class="field-icon">↕</span> Latitude
        </label>
        <input type="number" id="lat-input" class="dt-input" step="any" placeholder="1.000000">
      </div>

      <div class="ols-field">
        <label class="ols-field-label" for="lng-input">
          <span class="field-icon">↔</span> Longitude
        </label>
        <input type="number" id="lng-input" class="dt-input" step="any" placeholder="103.000000">
      </div>

      <div class="ols-field">
        <label class="ols-field-label" for="height-input">
          <span class="field-icon">▲</span> Height (m)
        </label>
        <input type="number" id="height-input" class="dt-input" placeholder="0">
      </div>

      <button id="check-btn" class="btn-apply" onclick="handleCheck()">Check OLS</button>

      <!-- Add Marker button in OLS Checker -->
      <button id="ols-add-marker-btn" class="btn-add-marker btn-add-marker--full">
        <svg width="12" height="12" viewBox="0 0 13 13" fill="none">
          <line x1="6.5" y1="1" x2="6.5" y2="12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="1" y1="6.5" x2="12" y2="6.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        Add Marker
      </button>

      <div id="status-info" data-state="idle">Awaiting input</div>
    </div>
  </div>

  <!-- ── ADD MARKER MODAL ──────────────────────────────────────────────────── -->
  <div id="add-marker-backdrop" class="modal-backdrop modal-backdrop--hidden"></div>
  <div id="add-marker-modal" class="modal modal--hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Add Marker</span>
      <button class="modal-close-btn" id="modal-close-btn" title="Close">✕</button>
    </div>

    <div class="modal-body">

      <div class="modal-field">
        <label class="modal-field-label" for="modal-id">
          <span class="field-icon">#</span> ID <span class="modal-required">*</span>
        </label>
        <input type="text" id="modal-id" class="dt-input" placeholder="e.g. MKR-001" autocomplete="off" />
        <span class="modal-field-error" id="modal-id-error"></span>
      </div>

      <div class="modal-row">
        <div class="modal-field">
          <label class="modal-field-label" for="modal-lat">
            <span class="field-icon">↕</span> Latitude <span class="modal-required">*</span>
          </label>
          <input type="number" id="modal-lat" class="dt-input" step="any" placeholder="1.000000" />
          <span class="modal-field-error" id="modal-lat-error"></span>
        </div>
        <div class="modal-field">
          <label class="modal-field-label" for="modal-lng">
            <span class="field-icon">↔</span> Longitude <span class="modal-required">*</span>
          </label>
          <input type="number" id="modal-lng" class="dt-input" step="any" placeholder="103.000000" />
          <span class="modal-field-error" id="modal-lng-error"></span>
        </div>
      </div>

      <div class="modal-field">
        <label class="modal-field-label" for="modal-height">
          <span class="field-icon">▲</span> Height (m)
        </label>
        <input type="number" id="modal-height" class="dt-input" placeholder="0" />
      </div>

      <div class="modal-row">
        <div class="modal-field">
          <label class="modal-field-label" for="modal-start">
            <span class="field-icon">▶</span> Start Datetime
          </label>
          <input type="datetime-local" id="modal-start" class="dt-input" />
        </div>
        <div class="modal-field">
          <label class="modal-field-label" for="modal-end">
            <span class="field-icon">■</span> End Datetime
          </label>
          <input type="datetime-local" id="modal-end" class="dt-input" />
        </div>
      </div>

    </div><!-- /modal-body -->

    <div class="modal-footer">
      <button id="modal-cancel-btn" class="btn-clear">Cancel</button>
      <button id="modal-submit-btn" class="btn-apply">Add Marker</button>
    </div>
  </div>
  <!-- /ADD MARKER MODAL -->

</div>

<script src="index.js"></script>
<!--"Official" way to load maps after the library is loaded in its entirety-->
<script async
  src="https://maps.googleapis.com/maps/api/js?key=AIzaSyA3diLnxz6U2ZGeqihaL0stvUxXvlYLpDI&libraries=marker&callback=initMap">
</script>
<script>
  // Tab switching — runs immediately (no map dependency)
  document.querySelectorAll('.sidebar-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      const target = tab.dataset.tab;
      // Swap active tab button
      document.querySelectorAll('.sidebar-tab').forEach(t => t.classList.remove('sidebar-tab--active'));
      tab.classList.add('sidebar-tab--active');
      // Swap visible panel
      document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.add('sidebar-panel--hidden'));
      document.getElementById('panel-' + target).classList.remove('sidebar-panel--hidden');
    });
  });
</script>
</body>
